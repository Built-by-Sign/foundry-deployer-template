[profile.default]
src = "src"
script = "script"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
cbor_metadata = false
bytecode_hash = "none"
fs_permissions = [
    { access = "read-write", path = "./deployments/" },
    { access = "read", path = "./" }
]
# FFI is required by foundry-deployer — DeployHelper uses FFI to read/write deployment artifacts.
# The CI profile below disables FFI for tests where it is not needed.
ffi = true

[profile.ci]
verbosity = 2
ffi = false
